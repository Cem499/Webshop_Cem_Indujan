version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: lb_shop_modul_295_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpw  
      MYSQL_DATABASE: LB_shop_modul_295
      MYSQL_USER: appuser                        
      MYSQL_PASSWORD: appuserpw                 
    ports:
      - "3308:3306"    
    volumes:
      - db_data:/var/lib/mysql
      - ./initdb:/docker-entrypoint-initdb.d:ro  

volumes:
  db_data: