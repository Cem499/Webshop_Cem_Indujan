# ============================================================
# Datenbankverbindung (MySQL)
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/LB_shop_modul_295
spring.datasource.username=manager
spring.datasource.password=managerpw
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Performance-Optimierungen
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=false

# ============================================================
# Server
# ============================================================
server.port=8081

# ============================================================
# JWT Konfiguration
# Secret muss Base64-kodiert und mind. 256 Bit (32 Zeichen) lang sein.
# Expiration in Millisekunden: 86400000 = 24 Stunden
# ============================================================
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# ============================================================
# Swagger / OpenAPI
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
